<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Brechó da Aninha da Dança</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <h1>Brechó da Aninha da Dança</h1>
      <p>Roupas com história, movimento e estilo</p>
    </header>
    <main class="vitrine">
      <div class="produto-card">
        <div class="produto-imagem"> 
       <img src="imagens/collant-rosa.jpg" alt="Collant Rosa Clássicos com alças finas.">
        </div>
        <div class="produto-info">
          <h3 class="produto-titulo">Collant Rosa Clássicos</h3>
          <p class="produto-preco">R$ 45,00</p>
          <a href="#" class="btn-comprar">Comprar Agora</a>
        </div>
      </div>
      <div class="produto-card">
        <div class="produto-imagem">
       <img src="imagens/saia-transpassada.jpg"  alt="Saia Transpassada de Ballet">
        </div>
        <div class="produto-info">
          <h3 class="produto-titulo">Saia Transpassada de Ballet</h3>
          <p class="produto-preco">R$ 30,00</p>
          <a href="#" class="btn-comprar">Comprar Agora</a>
        </div>
      </div>
      <div class="produto-card">
        <div class="produto-imagem">
       <img src="imagens/aquecedor-de-perna.jpg" alt="Aquecedor de Perna de Tricô">
        </div>
        <div class="produto-info">
          <h3 class="produto-titulo">Aquecedor de Perna de Tricô</h3>
          <p class="produto-preco">R$ 25,00</p>
          <a href="#" class="btn-comprar">Comprar Agora</a>
        </div>
      
    </main>
  </body>
</html>
